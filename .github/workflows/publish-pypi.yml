---
# Manual PyPI upload: Actions → Publish to PyPI → Run workflow (enter an existing tag, e.g. v0.1.0).
#
# Recommended: PyPI "Trusted Publishing" (OIDC) — no long-lived PYPI_API_TOKEN in GitHub.
#   Configure at https://pypi.org/manage/project/pymjolnir/settings/publishing/ (or TestPyPI first)
#   with this repo + workflow file name, environment optional.
#
# Alternative: repository secret PYPI_API_TOKEN and pass `password: ${{ secrets.PYPI_API_TOKEN }}`
#   to pypa/gh-action-pypi-publish (disable OIDC by omitting id-token permission if required).
name: Publish to PyPI
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to publish (e.g. v0.1.0)
        required: true
        type: string
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0
      - name: Validate release tag
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Tag must match the release pattern vX.Y.Z (received: ${{ inputs.tag }})" >&2
              exit 1
              ;;
          esac
          git rev-parse --verify "refs/tags/${{ inputs.tag }}"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v8
      - name: Sync dev toolchain (lockfile)
        run: uv sync --frozen --extra dev
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
