---
name: Release
# Option A (local Commitizen): maintainer runs `cz bump`, pushes the new `v*.*.*` tag;
# this workflow builds artifacts and creates a GitHub Release. PyPI is separate — see
# `.github/workflows/publish-pypi.yml` (workflow_dispatch).
on:
  push:
    tags: [v*.*.*]
permissions:
  contents: write
jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install build dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Build distributions
        run: uv build
      - name: Publish GitHub Release (assets)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
