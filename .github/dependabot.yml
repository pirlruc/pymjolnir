---
version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    groups:
      python-dev-tooling:
        dependency-type: development
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ['*']
  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    groups:
      pre-commit-hooks:
        patterns: ['*']
